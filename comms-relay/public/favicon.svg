<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#cba6f7" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e1e2e"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#313244" stroke-width="2"/>

  <!-- Stylized "C" — matching landing page mauve -->
  <text x="128" y="172" text-anchor="middle" font-family="monospace" font-size="160" font-weight="bold"
    fill="#cba6f7" filter="url(#glow)" letter-spacing="0">C</text>

  <!-- Subtle circuit accents -->
  <line x1="60" y1="80" x2="80" y2="80" stroke="#45475a" stroke-width="1.5"/>
  <circle cx="60" cy="80" r="2.5" fill="#f38ba8"/>
  <line x1="60" y1="176" x2="80" y2="176" stroke="#45475a" stroke-width="1.5"/>
  <circle cx="60" cy="176" r="2.5" fill="#a6e3a1"/>
</svg>
